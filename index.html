<title>タイムテーブル計算機くん</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
:root {
  --bg: #0a0a0a;
  --card: #131313;
  --card2: #1b1b1b;
  --border: #2a2a2a;
  --accent: #00e676;
  --accent2: #2979ff;
  --danger: #ff5252;
  --warn: #ff9800;
  --text: #f0f0f0;
  --muted: #666;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 16px;
  max-width: 440px;
  margin: auto;
  min-height: 100vh;
}

h1 {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 18px;
  letter-spacing: 0.1em;
  text-align: center;
  color: var(--accent);
  padding: 20px 0 16px;
  opacity: 0.9;
}

/* ===== CARD ===== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  user-select: none;
  transition: background 0.15s;
}
.card-header:hover { background: var(--card2); }
.card-header .chevron { transition: transform 0.25s; font-size: 12px; color: var(--muted); }
.card-header.open .chevron { transform: rotate(180deg); }

.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  padding: 0 16px;
}
.card-body.open {
  max-height: 600px;
  padding: 0 16px 16px;
}

/* ===== FORM ===== */
label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 14px;
  margin-bottom: 4px;
}

input[type=text], input[type=date], select {
  width: 100%;
  padding: 10px 12px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
input[type=text]:focus, input[type=date]:focus, select:focus {
  border-color: var(--accent);
}

/* slider row */
.slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.slider-row input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  outline: none;
  cursor: pointer;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.slider-row input[type=number] {
  width: 64px;
  padding: 8px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  text-align: center;
  outline: none;
}
.slider-row input[type=number]:focus { border-color: var(--accent); }

/* ===== DJ ROWS ===== */
.dj-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
  cursor: grab;
}
.dj-row:active { cursor: grabbing; }
.dj-row .drag-handle {
  color: var(--muted);
  font-size: 16px;
  cursor: grab;
  padding: 0 4px;
  user-select: none;
}
.dj-row input {
  flex: 1;
  padding: 9px 12px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.dj-row input:focus { border-color: var(--accent); }
.dj-row .del-btn {
  width: 32px; height: 32px;
  background: transparent;
  border: 1px solid var(--danger);
  border-radius: 8px;
  color: var(--danger);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.dj-row .del-btn:hover { background: var(--danger); color: #fff; }

.add-dj-btn {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.add-dj-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== ACTION BUTTONS ===== */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin: 14px 0;
}
.btn {
  padding: 13px 8px;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-generate { background: var(--accent); color: #000; grid-column: 1 / -1; font-size: 15px; }
.btn-copy    { background: var(--accent2); color: #fff; }
.btn-save    { background: var(--warn); color: #000; }

/* ===== OUTPUT ===== */
#output {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  line-height: 2;
  white-space: pre-line;
  min-height: 60px;
  display: none;
}
#output.visible { display: block; }

.error-msg {
  color: var(--danger);
  font-size: 13px;
  text-align: center;
  margin-top: 8px;
  display: none;
}

/* ===== IMAGE AREA (offscreen) ===== */
#imageArea {
  position: fixed;
  left: -9999px;
  top: 0;
  width: 1080px;
  height: 1920px;
  background: #000;
  color: #fff;
  padding: 100px 90px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Noto Sans JP', sans-serif;
}
#imageTitle {
  font-size: 96px;
  font-weight: 900;
  text-align: center;
  word-break: break-all;
  max-width: 100%;
  line-height: 1.2;
}
#imageDate { font-size: 40px; margin-top: 14px; opacity: 0.6; }
#imageDivider { width: 60%; height: 1px; background: #fff; opacity: 0.2; margin: 50px 0; }
#imageContent {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.tt-line {
  display: flex;
  gap: 40px;
  align-items: baseline;
}
.tt-time {
  font-family: 'Space Mono', monospace;
  width: 160px;
  flex-shrink: 0;
  text-align: right;
  opacity: 0.5;
}
.tt-body { font-weight: 700; white-space: nowrap; }
</style>
</head>

<h1>タイムテーブル計算機くん</h1>

<!-- イベント -->
<div class="card">
  <div class="card-header" onclick="toggleCard(this)">
    <span>イベント</span><span class="chevron">▼</span>

  <div class="card-body">

<script>
/* ===== UTILS ===== */
const $ = id => document.getElementById(id);

const toMin = t => {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
};

const toTime = m => {
  // 表示は 24時間超えても "25:00" 形式で表現
  m = ((m % 1440) + 1440) % 1440;
  return String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');
};

const toTime24 = m => {
  // 24時以降は 00:00, 01:00 のように表記
  m = ((m % 1440) + 1440) % 1440;
  return String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');
};

function fillSelect(id, def) {
  const el = $(id);
  el.innerHTML = '';
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 30) {
      const val = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const o = new Option(val, val);
      if (val === def) o.selected = true;
      el.add(o);
    }
  }
}

function bindSlider(rangeId, numId, min, max) {
  const r = $(rangeId), n = $(numId);
  const clamp = v => Math.min(max, Math.max(min, v));
  r.oninput = () => { n.value = r.value; };
  n.oninput = () => { r.value = clamp(+n.value); n.value = r.value; };
}

/* ===== CARD TOGGLE ===== */
function toggleCard(header) {
  const body = header.nextElementSibling;
  const open = body.classList.toggle('open');
  header.classList.toggle('open', open);
}

/* ===== DJ LIST ===== */
function addDJ(name = '') {
  const row = document.createElement('div');
  row.className = 'dj-row';
  row.innerHTML = `
    <span class="drag-handle">⠿</span>
    <input type="text" placeholder="DJ 名" value="${name}">
    <button class="del-btn" onclick="this.parentNode.remove()">×</button>
  `;
  $('djList').appendChild(row);
}

function getDJNames() {
  return [...$('djList').querySelectorAll('input')].map(i => i.value.trim() || 'DJ');
}

function addGuest(name = '') {
  const row = document.createElement('div');
  row.className = 'dj-row';
  row.innerHTML = `
    <span class="drag-handle">⠿</span>
    <input type="text" placeholder="ゲスト名" value="${name}">
    <button class="del-btn" onclick="this.parentNode.remove()">×</button>
  `;
  $('guestList').appendChild(row);
}

function addLive(name = '') {
  const row = document.createElement('div');
  row.className = 'dj-row';
  row.innerHTML = `
    <span class="drag-handle">⠿</span>
    <input type="text" placeholder="ライブ名" value="${name}">
    <button class="del-btn" onclick="this.parentNode.remove()">×</button>
  `;
  $('liveList').appendChild(row);
}

function getGuestNames() {
  return [...$('guestList').querySelectorAll('input')].map(i => i.value.trim() || 'GUEST');
}

function getLiveNames() {
  return [...$('liveList').querySelectorAll('input')].map(i => i.value.trim() || 'LIVE');
}

/* ===== MAIN LOGIC ===== */
function run() {
  const errorEl = $('errorMsg');
  errorEl.style.display = 'none';

  const startMin = toMin($('start').value);
  let endMin = toMin($('end').value);

  // 終了が翌日になる場合を考慮
  if (endMin <= startMin) endMin += 1440;

  const totalMin = endMin - startMin;
  const regCount = parseInt($('regCount').value);
  const djNames = getDJNames();

  const gCount = $('guestList').querySelectorAll('.dj-row').length;
  const gMin   = parseInt($('guestMin').value);
  const lCount = $('liveList').querySelectorAll('.dj-row').length;
  const lMin   = parseInt($('liveMin').value);

  // ゲスト・ライブの固定時間合計
  const fixedMin = gCount * gMin + lCount * lMin;
  const remain = totalMin - fixedMin;

  if (remain <= 0) {
    showError('ゲスト・ライブだけで時間が埋まっています。時間配分を見直してください。');
    return;
  }
  if (remain < regCount * 5) {
    showError(`DJ ${regCount}人には時間が足りません（残り${remain}分）。DJ人数か時間帯を調整してください。`);
    return;
  }

  // DJ持ち時間を5分単位で均等分配
  const base = Math.floor(remain / regCount / 5) * 5;
  let leftover = remain - base * regCount;
  const extraMode = $('extraMode').value;

  // 余りを振り分けるインデックス列を生成
  const extraSlots = Math.round(leftover / 5);
  let extraIdx = [];

  if (extraMode === 'first') {
    // 先頭から順に
    for (let i = 0; i < extraSlots; i++) extraIdx.push(i % regCount);

  } else if (extraMode === 'last') {
    // 末尾から順に
    for (let i = 0; i < extraSlots; i++) extraIdx.push(regCount - 1 - (i % regCount));

  } else if (extraMode === 'both') {
    // 両端から交互に（0, N-1, 1, N-2, ...）
    let lo = 0, hi = regCount - 1, turn = 0;
    for (let i = 0; i < extraSlots; i++) {
      if (lo > hi) { lo = 0; hi = regCount - 1; } // 一周したらリセット
      extraIdx.push(turn % 2 === 0 ? lo++ : hi--);
      turn++;
    }

  } else if (extraMode === 'aroundevent') {
    // ゲスト・ライブを中心に、前後対称に均等振り分け
    const gCnt = $('guestList').querySelectorAll('.dj-row').length;
    const lCnt = $('liveList').querySelectorAll('.dj-row').length;
    const totalEvents = gCnt + lCnt;

    if (totalEvents === 0 || regCount <= 1) {
      // イベントなし → 先頭と末尾
      for (let i = 0; i < extraSlots; i++) extraIdx.push(i % 2 === 0 ? 0 : regCount - 1);
    } else {
      const gMin2 = parseInt($('guestMin').value);
      const lMin2 = parseInt($('liveMin').value);
      const fixedMin2 = gCnt * gMin2 + lCnt * lMin2;
      const remain2 = (toMin($('end').value) <= toMin($('start').value)
        ? toMin($('end').value) + 1440 : toMin($('end').value))
        - toMin($('start').value) - fixedMin2;
      const baseUnit = Math.floor(remain2 / regCount / 5) * 5 || 5;

      const startAbs = toMin($('start').value);
      const evTargets = [];
      let gSt = toMin($('guestStart').value);
      let lSt = toMin($('liveStart').value);
      if (gSt < startAbs) gSt += 1440;
      if (lSt < startAbs) lSt += 1440;
      for (let i = 0; i < gCnt; i++) evTargets.push(gSt + i * gMin2);
      for (let i = 0; i < lCnt; i++) evTargets.push(lSt + i * lMin2);
      evTargets.sort((a, b) => a - b);

      // 各イベントの「挟まれるDJインデックス境界」を求める
      // イベント直前DJ: Math.floor((et - startAbs) / baseUnit) - 1
      // イベント直後DJ: Math.floor((et - startAbs) / baseUnit)
      // そこから外側へ対称に 0,1,2... と広げていく順序リストを作る
      const pivots = evTargets.map(et => {
        const pos = (et - startAbs) / baseUnit;
        // 直前・直後の境界インデックス（0始まり）
        const before = Math.floor(pos) - 1;
        const after  = Math.floor(pos);
        return { before, after };
      });

      // 優先順リストを生成：各pivotから外側へ対称拡張
      // 1周目: before, after
      // 2周目: before-1, after+1
      // ...
      const ordered = [];
      const seen = new Set();
      const addIdx = i => {
        if (i >= 0 && i < regCount && !seen.has(i)) {
          seen.add(i);
          ordered.push(i);
        }
      };

      const maxRadius = regCount;
      for (let r = 0; r < maxRadius; r++) {
        pivots.forEach(({ before, after }) => {
          addIdx(before - r);
          addIdx(after  + r);
        });
        if (ordered.length >= extraSlots) break;
      }

      for (let i = 0; i < extraSlots; i++) {
        extraIdx.push(ordered[i % ordered.length]);
      }
    }
  }

  const djDur = new Array(regCount).fill(base);
  extraIdx.forEach(i => { if (i >= 0 && i < regCount) djDur[i] += 5; });

  // ゲスト・ライブ名
  const guestArr = getGuestNames().slice(0, gCount);
  while (guestArr.length < gCount) guestArr.push(`GUEST ${guestArr.length + 1}`);
  const liveArr = getLiveNames().slice(0, lCount);
  while (liveArr.length < lCount) liveArr.push(`LIVE ${liveArr.length + 1}`);

  // ゲスト・ライブの開始時間（絶対分）
  let guestStartMin = toMin($('guestStart').value);
  let liveStartMin  = toMin($('liveStart').value);
  if (guestStartMin < startMin) guestStartMin += 1440;
  if (liveStartMin  < startMin) liveStartMin  += 1440;

  // スケジュール組み立て
  const slots = buildSlots({
    startMin, endMin,
    djNames, djDur,
    guestArr, gCount, gMin, guestStartMin,
    liveArr,  lCount, lMin, liveStartMin,
  });

  if (!slots.length) {
    showError('スケジュールを生成できませんでした。');
    return;
  }

  const text = slots.map(s => `${toTime24(s.t)}  ${s.name}（${s.dur}）`).join('\n');
  const out = $('output');
  out.innerText = text;
  out.classList.add('visible');
  $('copyBtn').disabled = false;
  $('saveBtn').disabled = false;

  saveToHistory(captureState());
}

function buildSlots({ startMin, endMin, djNames, djDur, guestArr, gCount, gMin, guestStartMin, liveArr, lCount, lMin, liveStartMin }) {
  const slots = [];
  let t = startMin;
  let di = 0;

  // ゲスト・ライブを目安時刻順にリスト化
  const events = [];
  for (let i = 0; i < gCount; i++) events.push({ target: guestStartMin + i * gMin, name: guestArr[i], dur: gMin });
  for (let i = 0; i < lCount; i++) events.push({ target: liveStartMin  + i * lMin,  name: liveArr[i],  dur: lMin  });
  events.sort((a, b) => a.target - b.target);

  let ei = 0;

  while (t < endMin) {
    const hasEvent = ei < events.length;
    const hasDJ    = di < djDur.length;

    if (!hasEvent && !hasDJ) break;

    if (!hasEvent) {
      // イベントなし → 残りDJをすべて入れる
      const name = di < djNames.length ? djNames[di] : `DJ ${di + 1}`;
      slots.push({ t, name, dur: djDur[di] });
      t += djDur[di];
      di++;
      continue;
    }

    if (!hasDJ) {
      // DJなし → 残りイベントを入れる
      slots.push({ t, name: events[ei].name, dur: events[ei].dur });
      t += events[ei].dur;
      ei++;
      continue;
    }

    // DJを1枠丸ごと入れた場合の終了時刻
    const afterDJ = t + djDur[di];
    const evTarget = events[ei].target;

    // DJを入れた後の終了時刻がイベント目安を超えていない
    // または DJを入れた方が目安時刻への誤差が小さい → DJを優先
    const diffIfDJ   = Math.abs(afterDJ - evTarget);  // DJ入れた後にイベントを置く場合の誤差
    const diffIfEv   = Math.abs(t - evTarget);         // 今すぐイベントを置く場合の誤差

    if (afterDJ <= evTarget || diffIfDJ <= diffIfEv) {
      // DJ を先に入れる
      const name = di < djNames.length ? djNames[di] : `DJ ${di + 1}`;
      slots.push({ t, name, dur: djDur[di] });
      t += djDur[di];
      di++;
    } else {
      // イベントを先に入れる
      slots.push({ t, name: events[ei].name, dur: events[ei].dur });
      t += events[ei].dur;
      ei++;
    }
  }

  return slots;
}

function parseNames(raw, count, fallback) {
  const arr = raw.split(',').map(v => v.trim()).filter(Boolean);
  while (arr.length < count) arr.push(`${fallback} ${arr.length + 1}`);
  return arr;
}

function showError(msg) {
  const el = $('errorMsg');
  el.innerText = msg;
  el.style.display = 'block';
}

/* ===== COPY ===== */
function copyTT() {
  const text = $('output').innerText;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = $('copyBtn');
    const orig = btn.innerText;
    btn.innerText = '✓ コピー済';
    setTimeout(() => btn.innerText = orig, 1500);
  });
}

/* ===== IMAGE SAVE ===== */
function saveImage() {
  const lines = $('output').innerText.split('\n').filter(v => v.trim());
  if (!lines.length) return;

  const W = 1080, H = 1920;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const px = 90;

  const draw = () => {
    const title = $('eventName').value.trim() || 'EVENT';
    const dateStr = $('eventDate').value || '';

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // タイトル
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'center';
    let titleSize = 96;
    ctx.font = `900 ${titleSize}px sans-serif`;
    while (ctx.measureText(title).width > W - px * 2 && titleSize > 40) {
      titleSize -= 4;
      ctx.font = `900 ${titleSize}px sans-serif`;
    }
    ctx.fillStyle = '#fff';
    ctx.fillText(title, W / 2, 100 + titleSize);

    // 日付
    let afterTitle = 100 + titleSize + 20;
    if (dateStr) {
      ctx.font = `400 54px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText(dateStr, W / 2, afterTitle + 54);
      afterTitle += 90;
    }

    // 区切り線
    const divY = afterTitle + 30;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(px * 2, divY);
    ctx.lineTo(W - px * 2, divY);
    ctx.stroke();

    // タイムテーブル
    const maxLen = Math.max(...lines.map(l => l.length));
    let fs = 56;
    if (maxLen > 22) fs = 50;
    if (maxLen > 26) fs = 44;
    if (maxLen > 30) fs = 38;

    const lineH = Math.floor(fs * 1.9);
    const timeW = 155;
    const bodyX = px + timeW + 32;
    let y = divY + 100;

    lines.forEach((line, idx) => {
      const parts = line.trim().split(/\s+/);
      const time = parts[0];
      const body = parts.slice(1).join(' ');

      if (idx % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.fillRect(px - 10, y - fs - 4, W - (px - 10) * 2, lineH);
      }

      ctx.font = `400 ${fs}px monospace`;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.textAlign = 'right';
      ctx.fillText(time, px + timeW, y);

      ctx.font = `700 ${fs}px sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'left';
      ctx.fillText(body, bodyX, y);

      y += lineH;
    });

    // モーダルに表示（長押し保存）
    const modal = document.getElementById('imgModal');
    const preview = document.getElementById('imgPreview');
    preview.src = canvas.toDataURL('image/png');
    modal.style.display = 'flex';
  };

  document.fonts.ready.then(draw);
}


/* ===== INIT ===== */
/* ===== HISTORY ===== */
const HISTORY_KEY = 'tt_history';
const HISTORY_MAX = 5;

function saveToHistory(state) {
  const hist = loadHistory();
  // 同名・同日付の重複は上書き
  const idx = hist.findIndex(h => h.eventName === state.eventName && h.eventDate === state.eventDate);
  if (idx !== -1) hist.splice(idx, 1);
  hist.unshift(state);
  if (hist.length > HISTORY_MAX) hist.length = HISTORY_MAX;
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(hist)); } catch(e) {}
  renderHistory();
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
}

function renderHistory() {
  const hist = loadHistory();
  const list = $('historyList');
  const empty = $('historyEmpty');
  list.innerHTML = '';
  if (!hist.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  hist.forEach((h, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;';
    const label = document.createElement('button');
    label.style.cssText = 'flex:1;text-align:left;background:#1b1b1b;border:1px solid #2a2a2a;border-radius:8px;color:#f0f0f0;padding:10px 12px;font-size:13px;cursor:pointer;line-height:1.5;';
    label.innerHTML = `<span style="font-weight:700;">${h.eventName || '(名前なし)'}</span><br><span style="color:#666;font-size:11px;">${h.eventDate || ''} &nbsp; DJ×${h.djNames.length} ゲスト×${h.guestNames.length} ライブ×${h.liveNames.length}</span>`;
    label.onclick = () => loadFromHistory(h);
    const del = document.createElement('button');
    del.style.cssText = 'width:32px;height:32px;background:transparent;border:1px solid #ff5252;border-radius:8px;color:#ff5252;font-size:18px;cursor:pointer;flex-shrink:0;';
    del.innerHTML = '×';
    del.onclick = () => deleteHistory(i);
    row.appendChild(label);
    row.appendChild(del);
    list.appendChild(row);
  });
}

function deleteHistory(i) {
  const hist = loadHistory();
  hist.splice(i, 1);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(hist)); } catch(e) {}
  renderHistory();
}

function captureState() {
  return {
    eventName:  $('eventName').value,
    eventDate:  $('eventDate').value,
    start:      $('start').value,
    end:        $('end').value,
    regCount:   $('regCount').value,
    extraMode:  $('extraMode').value,
    djNames:    getDJNames(),
    guestNames: getGuestNames(),
    liveNames:  getLiveNames(),
    guestMin:   $('guestMin').value,
    liveMin:    $('liveMin').value,
    guestStart: $('guestStart').value,
    liveStart:  $('liveStart').value,
  };
}

function loadFromHistory(h) {
  $('eventName').value = h.eventName || '';
  $('eventDate').value = h.eventDate || '';
  $('start').value     = h.start;
  $('end').value       = h.end;
  $('regCount').value  = h.regCount;
  $('regCountNum').value = h.regCount;
  $('extraMode').value = h.extraMode || 'first';
  $('guestMin').value  = h.guestMin;
  $('guestMinNum').value = h.guestMin;
  $('liveMin').value   = h.liveMin;
  $('liveMinNum').value  = h.liveMin;
  $('guestStart').value = h.guestStart;
  $('liveStart').value  = h.liveStart;

  $('djList').innerHTML = '';
  (h.djNames || []).forEach(n => addDJ(n));
  $('guestList').innerHTML = '';
  (h.guestNames || []).forEach(n => addGuest(n));
  $('liveList').innerHTML = '';
  (h.liveNames || []).forEach(n => addLive(n));
}

window.onload = () => {
  fillSelect('start',      '20:00');
  fillSelect('end',        '24:00');
  fillSelect('guestStart', '22:00');
  fillSelect('liveStart',  '21:00');

  // デフォルトDJ 5人
  for (let i = 0; i < 5; i++) addDJ();

  bindSlider('regCount',   'regCountNum',   1, 20);
  bindSlider('guestMin',   'guestMinNum',  10, 120);
  bindSlider('liveMin',    'liveMinNum',   10, 120);

  // DJ並び替え
  new Sortable($('djList'),    { animation: 150, handle: '.drag-handle' });
  new Sortable($('guestList'), { animation: 150, handle: '.drag-handle' });
  new Sortable($('liveList'),  { animation: 150, handle: '.drag-handle' });

  renderHistory();
};
</script>
</body>
</html>
